<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="hubGL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <radialGradient id="nodeGL" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </radialGradient>
    <filter id="glowL" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo claro -->
  <rect width="512" height="512" rx="110" fill="#eff6ff"/>

  <!-- Anillo exterior punteado -->
  <circle cx="256" cy="256" r="168" fill="none"
          stroke="#2563eb" stroke-width="4" opacity="0.15"
          stroke-dasharray="18 14"/>

  <!-- Líneas de conexión al centro -->
  <line x1="256" y1="256" x2="256" y2="100"
        stroke="#2563eb" stroke-width="13" stroke-linecap="round" opacity="0.45"/>
  <line x1="256" y1="256" x2="412" y2="256"
        stroke="#2563eb" stroke-width="13" stroke-linecap="round" opacity="0.45"/>
  <line x1="256" y1="256" x2="256" y2="412"
        stroke="#2563eb" stroke-width="13" stroke-linecap="round" opacity="0.45"/>
  <line x1="256" y1="256" x2="100" y2="256"
        stroke="#2563eb" stroke-width="13" stroke-linecap="round" opacity="0.45"/>

  <!-- Líneas diagonales secundarias -->
  <line x1="256" y1="256" x2="152" y2="152"
        stroke="#2563eb" stroke-width="7" stroke-linecap="round" opacity="0.18"/>
  <line x1="256" y1="256" x2="360" y2="152"
        stroke="#2563eb" stroke-width="7" stroke-linecap="round" opacity="0.18"/>
  <line x1="256" y1="256" x2="360" y2="360"
        stroke="#2563eb" stroke-width="7" stroke-linecap="round" opacity="0.18"/>
  <line x1="256" y1="256" x2="152" y2="360"
        stroke="#2563eb" stroke-width="7" stroke-linecap="round" opacity="0.18"/>

  <!-- Nodos diagonales pequeños -->
  <circle cx="152" cy="152" r="16" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="5" opacity="0.75"/>
  <circle cx="360" cy="152" r="16" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="5" opacity="0.75"/>
  <circle cx="360" cy="360" r="16" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="5" opacity="0.75"/>
  <circle cx="152" cy="360" r="16" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="5" opacity="0.75"/>

  <!-- Puntos medios -->
  <circle cx="256" cy="178" r="9" fill="#2563eb" opacity="0.35"/>
  <circle cx="334" cy="256" r="9" fill="#2563eb" opacity="0.35"/>
  <circle cx="256" cy="334" r="9" fill="#2563eb" opacity="0.35"/>
  <circle cx="178" cy="256" r="9" fill="#2563eb" opacity="0.35"/>

  <!-- Nodos principales cardinales -->
  <circle cx="256" cy="100" r="32" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="10" filter="url(#glowL)"/>
  <circle cx="412" cy="256" r="32" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="10" filter="url(#glowL)"/>
  <circle cx="256" cy="412" r="32" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="10" filter="url(#glowL)"/>
  <circle cx="100" cy="256" r="32" fill="url(#nodeGL)" stroke="#2563eb" stroke-width="10" filter="url(#glowL)"/>

  <!-- Hub central -->
  <circle cx="256" cy="256" r="54" fill="url(#hubGL)" filter="url(#glowL)"/>
  <circle cx="256" cy="256" r="30" fill="none" stroke="#fff" stroke-width="4" opacity="0.35"/>
  <circle cx="256" cy="256" r="12" fill="#fff" opacity="0.95"/>
</svg>
